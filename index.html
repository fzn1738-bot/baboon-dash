<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0f172a" />
    <title>Baboon Dash</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
        -webkit-tap-highlight-color: transparent; /* Remove tap highlight on mobile */
      }
      ::-webkit-scrollbar { width: 4px; height: 4px; } /* Thinner scrollbar for mobile feel */
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
      
      /* Safe area padding for bottom nav on iPhone X+ */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom, 20px);
      }
      
      @keyframes pulse-once {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
      }
      .animate-pulse-once {
        animation: pulse-once 0.3s ease-in-out;
      }
      
      .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
      }
      
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .invert iframe, .invert img, .invert video {
        filter: invert(1) hue-rotate(180deg);
      }

      html.light-theme {
        filter: invert(1) hue-rotate(180deg);
        background-color: #f0e8d5; /* inverted #0f172a */
      }
      html.light-theme iframe, html.light-theme img, html.light-theme video {
        filter: invert(1) hue-rotate(180deg);
      }
    </style>
