server {
    listen 8080;
    server_name localhost;

    # Serve your React static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy Bybit API requests to avoid CORS issues in production
    location /v5/ {
        # Transparent proxy pass (no trailing slash)
        proxy_pass https://api.bybit.com;
        
        proxy_set_header Host api.bybit.com;
        proxy_ssl_server_name on;
        
        # MASK THE CLIENT IP:
        # Clear these headers so Bybit only sees the Cloud Run server's European IP, 
        # not your personal US IP address.
        proxy_set_header X-Real-IP "";
        proxy_set_header X-Forwarded-For "";
        
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}